name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # PHASE 1: CHECKOUT
      - name: Checkout Code
        uses: actions/checkout@v4

      # PHASE 2: CACHE MAVEN DEPENDENCIES
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # PHASE 3: JAVA SETUP
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # PHASE 4: BUILD APPLICATION
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # PHASE 5: SONARQUBE SCAN
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_SCANNER_OPTS: "-Dsonar.scanner.skipJreProvisioning=true"

      # PHASE 6: DOCKER LOGIN
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # PHASE 7: BUILD AND PUSH IMAGE
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/train-ticket-reservation:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/train-ticket-reservation:latest

      # PHASE 8: TRIVY SECURITY SCAN
      - name: Scan Image using Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/train-ticket-reservation:latest
          format: sarif
          output: trivy-results.sarif

      # PHASE 9: COPY FILES TO K8S MASTER
      - name: Copy Kubernetes Files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.MASTER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s/*"
          target: "/home/${{ secrets.SSH_USER }}/deploy_files"

      # PHASE 10: DEPLOY APPLICATION
      - name: Deploy Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.MASTER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            kubectl apply -f /home/${{ secrets.SSH_USER }}/deploy_files/k8s/deployment.yaml
            kubectl apply -f /home/${{ secrets.SSH_USER }}/deploy_files/k8s/service.yaml
            kubectl set image deployment/train-ticket-app train-ticket-app=${{ secrets.DOCKER_USERNAME }}/train-ticket-reservation:${{ github.sha }} --record
            kubectl rollout status deployment/train-ticket-app

      # PHASE 11: EMAIL NOTIFICATION
      - name: Send Deployment Mail
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Deployment Successful
          body: |
            Train Ticket Reservation App deployed successfully.
            Access: http://${{ secrets.MASTER_IP }}:30007
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      # PHASE 12: FAILURE NOTIFICATION (Optional)
      - name: Send Failure Mail
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Deployment Failed
          body: |
            Train Ticket Reservation App deployment failed.
            Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
